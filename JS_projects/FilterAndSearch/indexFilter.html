<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="stylesFilter.css" rel="stylesheet">
    <title>Filter and Search</title>
</head>
<body>
    <div class="wrapper">
        <div id="search-container">
            <input type="search" id="searchInput" placeholder="Search product name here..">
            <button id="searchButton">Search</button>
        </div>
        <div id="buttonsDiv">
            <button class="btnAll" onclick="filterItems('all')">All</button>
            <button class="btnAll" onclick="filterItems('dessert')">Dessert</button>
            <button class="btnAll" onclick="filterItems('firstCourses')">First Courses</button>
            <button class="btnAll" onclick="filterItems('secondCourses')">Second Courses</button>
            <button class="btnAll" onclick="filterItems('drinks')">Drinks</button>
            <button class="btnAll" onclick="filterItems('appetizer')">Appetizer</button>
        </div>
     <div id="items"></div>
    </div>
    <script src="filterJs.js"></script>
</body>
</html>
